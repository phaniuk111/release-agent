name: build-image

# Build (and push) the Release Copilot container image to GitHub Container Registry.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements.txt"
      - ".github/workflows/build-image.yml"
  pull_request:
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # push to ghcr.io

env:
  REGISTRY: ghcr.io
  # -> ghcr.io/<owner>/release-copilot  (matches the Helm chart's image.repository)
  IMAGE_NAME: ${{ github.repository_owner }}/release-copilot

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Don't push on PRs (no write creds / not desired) — build only to validate.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### 🐳 Pushed image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
