{{- if and (not .Values.githubToken.existingSecret) .Values.githubToken.value -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "release-copilot.secretName" . }}
  labels:
    {{- include "release-copilot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.githubToken.existingSecretKey }}: {{ .Values.githubToken.value | quote }}
{{- end }}
