# Default values for release-copilot.
# Deploys the FastAPI production UI (port 8000) to GKE behind Anthos Service Mesh.

replicaCount: 1   # In-memory checkpointer is per-pod; keep 1 unless you add a shared
                  # Postgres checkpointer (then enable destinationRule for stickiness).

image:
  repository: ghcr.io/phaniuk111/release-copilot
  tag: ""                # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Container entrypoint — runs the FastAPI app (matches the image's default CMD).
command:
  - python
  - -m
  - uvicorn
  - release_agent.app_fastapi:app
  - --app-dir
  - src
  - --host
  - "0.0.0.0"
  - --port
  - "8000"
args: []

containerPort: 8000

# --- Non-secret configuration (rendered into a ConfigMap, injected via envFrom) ---
config:
  RELEASE_AGENT_TARGET_REPO: "phaniuk111/devops"
  DEPLOY_REPO: "phaniuk111/deployment-repo"
  # REQUIRED for Vertex AI. Leave set to your GCP project id.
  GOOGLE_CLOUD_PROJECT: ""
  GOOGLE_CLOUD_LOCATION: "us-central1"
  GEMINI_MODEL: "gemini-2.5-flash"
  DEFAULT_WORKFLOW: "image-tag-step-report.yml"
  ON_MERGE_WORKFLOW: "on-merge-deploy.yml"
  # Comma-separated allow-list of workflows the agent may dispatch (enforced).
  ALLOWED_WORKFLOWS: "image-tag-step-report.yml,release-promote.yml,create-deployment-pr.yml"
  # PRD release policy (shared across all sessions via GitHub): at most one PRD PR
  # per day, and only before this UTC hour. The UI shows today's window status.
  PRD_CUTOFF_HOUR_UTC: "16"
  PRD_ONCE_PER_DAY: "true"

# Extra raw env entries appended to the container (list of {name,value|valueFrom}).
extraEnv: []

# --- GitHub token (required; the in-cluster image has no `gh` login fallback) ---
githubToken:
  # Recommended: reference a Secret you manage (kubectl/external-secrets/sealed-secrets).
  existingSecret: ""          # e.g. "release-copilot-secrets"
  existingSecretKey: "gh-token"
  # Dev convenience only: have the chart create the Secret from this value.
  # Prefer existingSecret in production. Set via --set-string or a private values file.
  value: ""

serviceAccount:
  create: true
  name: ""
  # GKE Workload Identity: bind this KSA to a GCP SA that has Vertex AI access.
  annotations: {}
    # iam.gke.io/gcp-service-account: release-copilot@<PROJECT_ID>.iam.gserviceaccount.com

# --- ASM / Istio sidecar injection ---
# For managed ASM, prefer labeling the namespace with the revision, e.g.:
#   kubectl label namespace <ns> istio.io/rev=asm-managed --overwrite
# Setting this true also adds a pod-level injection annotation as a belt-and-braces.
istioInjection: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

# Probes hit the FastAPI /health endpoint.
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 3
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3

service:
  type: ClusterIP
  port: 80
  portName: http   # Istio requires a named port; an 'http' prefix sets the protocol.

# --- Istio VirtualService ---
virtualService:
  enabled: true
  hosts:
    - release-copilot.example.com
  # Path prefix for a SHARED domain hosting multiple apps, e.g. "/release-copilot".
  # When set, the app is served at https://<host><pathPrefix>/ and the prefix is
  # stripped before reaching the pod (the UI is prefix-relative, so it just works).
  # Leave "" to serve at the host root "/".
  pathPrefix: ""
  # Gateways the VS attaches to. Ignored when gateway.enabled=true (the chart's
  # own Gateway is used instead). Point this at your ASM ingress gateway, e.g.
  # "istio-ingress/asm-ingressgateway" or "istio-system/asm-ingressgateway".
  gateways:
    - istio-ingress/asm-ingressgateway
  # Long timeout: a promote streams over SSE and polls for the created PR (~40s),
  # well past Envoy's 15s route default. Use "0s" to disable entirely for SSE.
  timeout: "120s"
  retries: {}
    # attempts: 2
    # perTryTimeout: 60s

# --- Optional Istio Gateway (enable only if you don't share a cluster gateway) ---
gateway:
  enabled: false
  selector:
    istio: ingressgateway   # ASM ingress gateway selector
  port:
    number: 80
    name: http
    protocol: HTTP
  tls: {}
    # mode: SIMPLE
    # credentialName: release-copilot-tls

# --- Optional DestinationRule for session stickiness (needed if replicaCount>1) ---
destinationRule:
  enabled: false
  consistentHash:
    useSourceIp: true

nodeSelector: {}
tolerations: []
affinity: {}
