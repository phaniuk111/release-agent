apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-copilot
  labels:
    app: release-copilot
spec:
  replicas: 1   # Stateful chat threads - start with 1. Use shared Postgres checkpointer for >1
  selector:
    matchLabels:
      app: release-copilot
  template:
    metadata:
      labels:
        app: release-copilot
    spec:
      containers:
      - name: agent
        image: ghcr.io/phaniuk111/release-copilot:latest   # replace with your image
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: BUILD_REPO
          value: "phaniuk111/devops"
        # Deployment repo where PRs with CHG tickets and controls are created
        # - name: DEPLOY_REPO
        #   value: "phaniuk111/devops"
        # Vertex AI Gen AI SDK
        # Do not hardcode in production manifests — use ConfigMap or env injection
        - name: GOOGLE_CLOUD_PROJECT
          value: "your-project-id"
        - name: GOOGLE_CLOUD_LOCATION
          value: "us-central1"
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: release-copilot-secrets
              key: gh-token
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: release-copilot
spec:
  selector:
    app: release-copilot
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
