apiVersion: v1
kind: Secret
metadata:
  name: release-copilot-secrets
type: Opaque
stringData:
  # Base64 encode real values in real clusters (or use external-secrets / sealed-secrets)
  gh-token: "ghp_XXXXXXXXXXXXXXXXXXXXXXXX"   # PAT with repo + workflow scopes, or GitHub App token

  # For Vertex AI Gen AI SDK, use Workload Identity or mounted service account key.
  # GOOGLE_APPLICATION_CREDENTIALS can be mounted instead of secrets.
